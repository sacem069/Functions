<!doctype html>

<html>

<head>
  <meta charset="utf-8">
  <title> Parsons Making Center </title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="assets/reset.css" rel="stylesheet">
  <link href="assets/style.css" rel="stylesheet">
  <script defer src="assets/main.js"></script>
</head>

<body>
  <header>
    <h1> Parsons Making Center </h1>
  </header>


  <form id="making-center-form">


    <section id="tools">
  
      <section>
      <label for="tool-select-3D"></label>

      <select name="tools3D" id="tool-select-3D">
        <option value="">Choose a tool 3D</option>
        <hr />

        <optgroup label="3D & Digital Prototyping">
          <option value="Prusa MK3S+">Prusa MK3S+</option>
          <option value="Prusa XL">Prusa XL</option>
          <option value="Form 4">Form 4</option>
          <option value="EinScan H Handheld Scanner">EinScan H Handheld Scanner</option>
          <option value="EinScan-SP Desktop Scanner">EinScan-SP Desktop Scanner</option>
          <option value="PotterBot Micro V10">PotterBot Micro V10</option>
        </optgroup>

        </select>

    </section>


    <section>
      <label for="tool-select-print"></label>

      <select name="print" id="tool-select-print">
        <option value="">Choose a tool Print</option>
        <hr />
        <optgroup label="Print">
          <option value="Inkjet Plotter">Inkjet Plotter</option>
          <option value="Mac Pro">Mac Pro</option>
          <option value="Photo Scanner">Photo Scanner</option>
        </optgroup>
      </select>
    </section>


    <section>
      <label for="tool-select-media"></label>
      <select name="media" id="tool-select-media">
        <option value="">Choose a tool Media</option>

        <hr />
        <optgroup label="Media">
          <option value="AC Strobe Light Kit">AC Strobe Light Kit</option>
          <option value="Light Modifiers">Light Modifiers</option>
          <option value="Continuous Light Kits">Continuous Light Kits</option>
          <option value="Portable Backdrop">Portable Backdrop</option>
        </optgroup>
      </select>
    </section>


    <section>

      <label for="tool-select-wood"></label>
      <select name="wood" id="tool-select-wood">
        <option value="">Choose a tool Wood</option>


        <hr />
        <optgroup label="Wood, Metal and Ceramics">
          <option value="Table Saw">Table Saw</option>
          <option value="Drill Press">Drill Press</option>
          <option value="Flex Shafts">Flex Shafts</option>
          <option value="Hand Tools">Hand Tools</option>
          <option value="Drill Bits">Drill Bits</option>
        </optgroup>
      </select>
    </section>



    <section>
      <label for="tool-select-sewing"></label>
      <select name="sewing" id="tool-select-sewing">
        <option value="">Choose a tool Sewing</option>


        <hr />
        <optgroup label="Sewing and Textiles">
          <option value="Sewing Machine">Sewing Machine</option>
          <option value="Coverstitch Machine">Coverstitch Machine</option>
          <option value="Cylinder Arm Machine">Cylinder Arm Machine</option>
          <option value="5-Step Machine">5-Step Machine</option>
          <option value="Walking Foot Flat Bed Machine">Walking Foot Flat Bed Machine</option>
          <option value="Post Machine">Post Machine</option>
          <option value="Edge Skiver">Edge Skiver</option>
          <option value="Blind Hem Machine">Blind Hem Machine</option>
          <option value="Bonis Fur Machine">Bonis Fur Machine</option>
          <option value="Double Needle Placket">Double Needle Placket</option>
          <option value="Bartack">Bartack</option>
          <option value="Ultrasonic Welder">Ultrasonic Welder</option>
          <option value="Computerized Domestic Sewing Machine">Computerized Domestic Sewing Machine</option>
          <option value="Heat Press">Heat Press</option>
          <option value="2-needle Chainstitch">2-needle Chainstitch</option>
        </optgroup>

      </select>
    </section>
    </section>


    <section>
      <label for="day-select">Choose a day:</label>
      <select name="day" id="day-select">
        <option value="">Choose a day</option>
        <option value="Monday">Monday</option>
        <option value="Tuesday">Tuesday</option>
        <option value="Wednesday">Wednesday</option>
        <option value="Thursday">Thursday</option>
        <option value="Friday">Friday</option>
        <option value="Saturday">Saturday</option>
        <option value="Sunday">Sunday</option>

      </select>
    </section>

    <section>
      <label for="time-select"> Choose a time: </label>
      <input type="time" id="time-select" name="time" min="09:00" max="22:30" required />

    </section>

    <section>
      <button type="reset">Reset</button>
      <button>Submit</button>
    </section>

  </form>
  <ul id="makingcenter-list"></ul>


</body>

</html>
