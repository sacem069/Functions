<!doctype html>

<html>

<head>
  <meta charset="utf-8">
  <!-- <title> Parsons Making Center </title> -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="assets/reset.css" rel="stylesheet">
  <link href="assets/style.css" rel="stylesheet">
  <script defer src="assets/main.js"></script>
</head>

<body class="landing-mode">
  <header class="site-header">
    <img src="assets/images/MakingCenterLogo.png" alt="Parsons Making Center Logo" class="header-logo-left" id="logo-home">
    <img src="assets/images/IDSchools_Parsons_Logo.png" alt="Parsons Logo" class="header-logo-right">


  </header>


  <form id="making-center-form">

    <section id="step-0" class="step active-step landing-step">
      <div class="landing-content">
        <img src="assets/images/MakingCenterLogo2.png" alt="Parsons Making Center Logo" class="landing-logo">

        <p class="landing-text">
          Find the way to the Parsons Making Space you are looking for
        </p>
        <button type="button" id="start-flow"> START</button>
      </div>
    </section>


    <section id="step-1" class="step">
      <label for="tool-select"> CHOOSE CATEGORY </label>

      <section id="tool-picker"> </section>
      <section id="lab-picker"></section>
      <section id="tool-dropdown"></section>
      <input type="hidden" id="tool-select" name="tools">

      <div class="step-actions">
        <button type="button" id="to-step-2" class="flow-button"> NEXT </button>
      </div>
    </section>

    <!-- CHOOSE A DAY -->

    <section id="step-2" class="step">

      <section>

        <label for="day-select">CHOOSE A DAY</label>
        <div class="select-wrapper">
        <select name="day" id="day-select">
          <option value="">CHOOSE A DAY</option>
          <option value="Monday">Monday</option>
          <option value="Tuesday">Tuesday</option>
          <option value="Wednesday">Wednesday</option>
          <option value="Thursday">Thursday</option>
          <option value="Friday">Friday</option>
          <option value="Saturday">Saturday</option>
          <option value="Sunday">Sunday</option>
        </select>
        </div>
      </section>


      <!-- CHOOSE A TIME -->

      <section>
        <label for="time-select">CHOOSE A TIME:</label>
        <button type="button" value="Morning" class="time-btn">Morning</button>
        <button type="button" value="Afternoon" class="time-btn">Afternoon</button>
        <button type="button" value="Evening" class="time-btn">Evening</button>
        <input type="hidden" id="time-select" name="time">
      </section>


      <div class="step-actions">
        <button type="button" id="back-to-step-1" class="back-button"> BACK </button>
        <button type="button" id="to-step-3" class="flow-button"> NEXT </button>
      </div>

      </section>

      <!-- BUTTONS -->
      <!-- <section id="form-buttons">
        <button type="reset" id="reset-btn" class="disabled">RESET</button>
        <button type="submit" id="search-btn" class="disabled">SEARCH</button>
      </section> -->

      <section id="step-3" class="step">
        <ul id="makingcenter-list"></ul>

        <div class="step-actions">
          <button type="button" id="restart-flow" class="flow-button"> RESTART</button>
        </div>
        </section>
  </form>

  <footer class="step-footer"> 
    <img src="assets/icons/tools-icon.svg" alt="tools" class="footer-icon active" id="footer-step-1">
    <img src="assets/icons/calendar-icon.svg" alt="calendar" class="footer-icon" id="footer-step-2">
    <img src="assets/icons/map-icon.svg" alt="clock" class="footer-icon" id="footer-step-3">
  </footer>
</body>

</html>
